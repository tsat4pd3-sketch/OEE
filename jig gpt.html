  <script type="text/babel">
    /*************************************************************
     * Utility: safe JSON parse for large strings
     *************************************************************/
    function parseLargeJSON(text) {
      try { return JSON.parse(text); } catch (e) { console.error(e); return []; }
    }

    // ---- FULL dataset from Excel (54 jigs / 1717 checkpoints) ----
    // (Auto-extracted) — this is the source of truth used by the app.
    const JIGS_ALL = parseLargeJSON(`REPLACE_ME_FULL_DATASET_JSON`);

    /*************************************************************
     * 2) Local "DB simulation" via localStorage
     *************************************************************/
    const DB_KEY = "pm_history_v1";

    function loadHistory() {
      try {
        const raw = localStorage.getItem(DB_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }
    function saveHistory(rows) {
      localStorage.setItem(DB_KEY, JSON.stringify(rows));
    }

    function uid() {
      return Math.random().toString(16).slice(2) + "-" + Date.now().toString(16);
    }

    function fmtDateTime(ts) {
      const d = new Date(ts);
      return d.toLocaleString("th-TH", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
    }

    function startOfMonth(d) {
      return new Date(d.getFullYear(), d.getMonth(), 1, 0, 0, 0, 0);
    }
    function startOfPrevMonth(d) {
      const m = new Date(d.getFullYear(), d.getMonth() - 1, 1, 0, 0, 0, 0);
      return m;
    }
    function endOfPrevMonth(d) {
      return new Date(d.getFullYear(), d.getMonth(), 0, 23, 59, 59, 999);
    }

    function within(ts, from, to) {
      const t = new Date(ts).getTime();
      return t >= from.getTime() && t <= to.getTime();
    }

    function cls(...xs){ return xs.filter(Boolean).join(" "); }

    /*************************************************************
     * 3) “AI” Insights / Anomaly Detection (rule-based logic)
     *************************************************************/
    function categorizeCheckpoint(label) {
      const s = (label || "").toLowerCase();
      if (s.includes("sensor") || s.includes("proximity") || s.includes("reed")) return "Sensor";
      if (s.includes("solen") || s.includes("valve") || s.includes("manifold")) return "Valve";
      if (s.includes("clamp")) return "Clamp";
      if (s.includes("bolt") || s.includes("nut")) return "Bolt/Nut";
      if (s.includes("service unit") || s.includes("su") || s.includes("fitting") || s.includes("สายลม") || s.includes("ลม")) return "Pneumatic";
      if (s.includes("pin") || s.includes("locator") || s.includes("locate")) return "Locate/Pin";
      if (s.includes("datum") || s.includes("support")) return "Datum/Support";
      return "Other";
    }

    function buildInsights(history, from, to) {
      const now = new Date();
      const thisMonthFrom = startOfMonth(now);
      const prevFrom = startOfPrevMonth(now);
      const prevTo = endOfPrevMonth(now);

      const inWindow = history.filter(h => within(h.timestamp, from, to));
      const inThisMonth = history.filter(h => within(h.timestamp, thisMonthFrom, now));
      const inPrevMonth = history.filter(h => within(h.timestamp, prevFrom, prevTo));

      // Count NG by jig + checkpoint
      const key = (jigNo, cpLabel) => `${jigNo}|||${cpLabel}`;

      function countNG(rows) {
        const map = new Map();
        for (const r of rows) {
          for (const it of (r.results || [])) {
            if (it.status === "NG") {
              const k = key(r.jigNo, it.label);
              map.set(k, (map.get(k) || 0) + 1);
            }
          }
        }
        return map;
      }

      const ngThisMonth = countNG(inThisMonth);
      const ngPrevMonth = countNG(inPrevMonth);

      // Baseline (average NG per checkpoint across all time)
      const ngAll = countNG(history);
      const baselineAvg = (() => {
        if (ngAll.size === 0) return 0;
        let total = 0;
        for (const v of ngAll.values()) total += v;
        return total / ngAll.size;
      })();

      // Anomalies: NG >= 3 in this month and > prev month (or prev 0)
      const anomalies = [];
      for (const [k, cnt] of ngThisMonth.entries()) {
        const prev = ngPrevMonth.get(k) || 0;
        if (cnt >= 3 && cnt > prev) {
          const [jigNo, cpLabel] = k.split("|||");
          anomalies.push({
            jigNo,
            cpLabel,
            count: cnt,
            prev,
            suggestion: cpLabel.toLowerCase().includes("valve") || cpLabel.toLowerCase().includes("solen")
              ? "ควรตรวจสอบระบบลมหลัก / fitting / manifold และการรั่วซึม"
              : cpLabel.toLowerCase().includes("sensor") || cpLabel.toLowerCase().includes("reed")
                ? "ควรตรวจสอบระยะ sensing, สายสัญญาณ, ขั้วต่อ และสภาพตัวเซ็นเซอร์"
                : "ควรตรวจสอบสภาพชิ้นส่วน, การยึดแน่น, และสาเหตุซ้ำซ้อน"
          });
        }
      }
      anomalies.sort((a,b)=> b.count - a.count);

      // Trend by category: compare NG rate current window vs previous equal-length window
      const windowMs = to.getTime() - from.getTime();
      const prevWinTo = new Date(from.getTime() - 1);
      const prevWinFrom = new Date(prevWinTo.getTime() - windowMs);

      const inPrevWindow = history.filter(h => within(h.timestamp, prevWinFrom, prevWinTo));

      function ngRateByCategory(rows) {
        const cat = new Map(); // cat -> {ng, total}
        for (const r of rows) {
          for (const it of (r.results || [])) {
            const c = categorizeCheckpoint(it.label);
            const cur = cat.get(c) || { ng: 0, total: 0 };
            cur.total += 1;
            if (it.status === "NG") cur.ng += 1;
            cat.set(c, cur);
          }
        }
        return cat;
      }

      const curCat = ngRateByCategory(inWindow);
      const prevCat = ngRateByCategory(inPrevWindow);

      const trends = [];
      for (const [c, cur] of curCat.entries()) {
        const prev = prevCat.get(c) || { ng: 0, total: 0 };
        const curRate = cur.total ? (cur.ng / cur.total) : 0;
        const prevRate = prev.total ? (prev.ng / prev.total) : 0;
        if (prevRate === 0 && curRate > 0.05) {
          trends.push({ category: c, changePct: 999, curRate, prevRate });
        } else if (prevRate > 0) {
          const changePct = ((curRate - prevRate) / prevRate) * 100;
          if (Math.abs(changePct) >= 20 && cur.total >= 20) {
            trends.push({ category: c, changePct, curRate, prevRate });
          }
        }
      }
      trends.sort((a,b)=> Math.abs(b.changePct) - Math.abs(a.changePct));

      // Insights text
      const msgs = [];

      if (anomalies.length) {
        const top = anomalies.slice(0, 5);
        for (const a of top) {
          msgs.push({
            type: "anomaly",
            title: `Anomaly: Jig ${a.jigNo} พบ NG ซ้ำที่ “${a.cpLabel}”`,
            detail: `เดือนนี้พบ NG ${a.count} ครั้ง (เดือนก่อน ${a.prev} ครั้ง) • ${a.suggestion}`
          });
        }
      } else {
        msgs.push({
          type: "ok",
          title: "Anomaly: ยังไม่พบจุดผิดปกติเด่นชัด",
          detail: `ยังไม่มี Check Point ใดที่พบ NG ซ้ำ ≥ 3 ครั้งในเดือนนี้ หรือมีแนวโน้มแย่ลงเมื่อเทียบเดือนก่อน`
        });
      }

      if (trends.length) {
        const t = trends[0];
        const sign = t.changePct === 999 ? "เพิ่มขึ้นมาก" : (t.changePct > 0 ? `สูงขึ้น ${t.changePct.toFixed(0)}%` : `ลดลง ${Math.abs(t.changePct).toFixed(0)}%`);
        msgs.push({
          type: t.changePct > 0 ? "trend_up" : "trend_down",
          title: `Trend: หมวด “${t.category}” ${sign} เมื่อเทียบกับช่วงก่อนหน้า`,
          detail: `NG rate ปัจจุบัน ${(t.curRate*100).toFixed(1)}% • ช่วงก่อนหน้า ${(t.prevRate*100).toFixed(1)}%`
        });
      } else {
        msgs.push({
          type: "info",
          title: "Trend: แนวโน้มยังไม่ชัด (ต้องมีข้อมูลเพิ่ม)",
          detail: "เมื่อมีประวัติ PM มากขึ้น ระบบจะเริ่มเห็นเทรนด์ชัดขึ้น (เช่น Sensor/Valve สูงขึ้นหรือลดลง)"
        });
      }

      // “smart” baseline suggestion
      msgs.push({
        type: "hint",
        title: "Smart Hint",
        detail: `Baseline NG เฉลี่ยต่อ Check Point (สะสมทั้งหมด) ≈ ${baselineAvg.toFixed(2)} • แนะนำโฟกัส Top NG Items และทำมาตรการป้องกันซ้ำ`
      });

      return msgs;
    }

    function Segmented({ value, onChange, options }) {
      return (
        <div className="inline-flex rounded-xl bg-slate-100 p-1 ring-1 ring-slate-200">
          {options.map(opt => (
            <button
              key={opt.value}
              onClick={() => onChange(opt.value)}
              className={cls(
                "px-3 py-1.5 rounded-lg text-sm font-semibold transition",
                value === opt.value ? "bg-white shadow-sm ring-1 ring-slate-200 text-slate-900" : "text-slate-600 hover:text-slate-900"
              )}
            >
              {opt.label}

        </div>

    function PillButton({ active, tone, onClick, children }) {
      const styles = {
        ok: active
          ? "bg-emerald-600 text-white ring-emerald-600"
          : "bg-emerald-50 text-emerald-700 ring-emerald-200 hover:bg-emerald-100",
        ng: active
          ? "bg-rose-600 text-white ring-rose-600"
          : "bg-rose-50 text-rose-700 ring-rose-200 hover:bg-rose-100"
      };
      return (
        <button
          onClick={onClick}
          className={cls("px-4 py-2 rounded-xl font-bold ring-1 transition", styles[tone])}
        >
          {children}
        </button>
      );
    }

    /*************************************************************
     * 5) Pages
     *************************************************************/
    function InputPage({ jigs, onSaved, historyCount }) {
      const [jigNo, setJigNo] = useState(jigs[0]?.jigNo || "");
      const jig = useMemo(() => jigs.find(j => j.jigNo === jigNo) || null, [jigs, jigNo]);

      const [inspector, setInspector] = useState("");
      const [notes, setNotes] = useState("");
      const [answers, setAnswers] = useState(() => ({})); // cpId -> {status, remark}

      useEffect(() => {
        // reset answers when jig changes
        setAnswers({});
        setNotes("");
      }, [jigNo]);

      const groups = useMemo(() => {
        if (!jig) return [];
        const map = new Map();
        for (const cp of jig.checkpoints) {
          const parent = cp.parent || "Main";
          if (!map.has(parent)) map.set(parent, []);
          map.get(parent).push(cp);
        }
        // stable ordering: Main first, then alpha
        const keys = Array.from(map.keys());
        keys.sort((a,b) => (a === "Main" ? -1 : b === "Main" ? 1 : a.localeCompare(b)));
        return keys.map(k => ({ parent: k, items: map.get(k) }));
      }, [jig]);

      const total = jig?.checkpoints?.length || 0;
      const done = useMemo(() => {
        let n = 0;
        for (const cp of (jig?.checkpoints || [])) {
          if (answers[cp.id]?.status) n++;
        }
        return n;
      }, [answers, jig]);

      const failCount = useMemo(() => {
        let n = 0;
        for (const a of Object.values(answers)) if (a?.status === "NG") n++;
        return n;
      }, [answers]);

      const canSave = inspector.trim().length >= 2 && jig && done === total;

      function setStatus(cp, status) {
        setAnswers(prev => {
          const cur = prev[cp.id] || {};
          const next = { ...prev, [cp.id]: { ...cur, status, remark: status === "OK" ? "" : (cur.remark || "") } };
          return next;
        });
      }

      function setRemark(cp, remark) {
        setAnswers(prev => ({ ...prev, [cp.id]: { ...(prev[cp.id] || {}), remark } }));
      }

      function buildStandardText(cp) {
        const parts = [];
        if (cp.standard != null) parts.push(`Std: ${cp.standard}`);
        if (cp.max != null || cp.min != null) {
          const mm = [];
          if (cp.max != null) mm.push(`Max ${cp.max}`);
          if (cp.min != null) mm.push(`Min ${cp.min}`);
          parts.push(mm.join(" • "));
        }
        if (cp.method) parts.push(`Method: ${cp.method}`);
        return parts.join(" • ");
      }

      function handleSave() {
        if (!canSave) return;

        const ts = new Date().toISOString();
        const results = jig.checkpoints.map(cp => ({
          checkpointId: cp.id,
          label: cp.label,
          parent: cp.parent,
          standard: cp.standard,
          method: cp.method,
          status: answers[cp.id].status,
          remark: answers[cp.id].remark || ""
        }));

        const overallStatus = results.some(r => r.status === "NG") ? "FAIL" : "PASS";

        const record = {
          id: uid(),
          timestamp: ts,
          inspector: inspector.trim(),
          jigNo: jig.jigNo,
          partName: jig.partName,
          process: jig.process,
          model: jig.model,
          overallStatus,
          headerRemark: notes.trim(),
          results
        };

        const history = loadHistory();
        history.unshift(record);
        saveHistory(history);

        onSaved?.(record);
        // reset for next job
        setAnswers({});
        setNotes("");
      }

      return (
        <div className="max-w-6xl mx-auto px-4 pb-24">
          <div className="pt-6 pb-4">
            <div className="flex items-start justify-between gap-4">
              <div>
                <div className="text-xs font-semibold text-slate-500">Preventive Maintenance • Data Input</div>
                <div className="text-2xl font-extrabold tracking-tight">PM Check (หน้างาน)</div>
                <div className="mt-1 text-sm text-slate-600">เลือก Jig แล้วตรวจ Check Point กด <span className="font-bold text-emerald-700">OK</span> / <span className="font-bold text-rose-700">NG</span> ได้เลย</div>
              </div>
              <div className="hidden sm:flex items-center gap-2">
                <Badge tone="blue"><Icon name="database" className="w-3.5 h-3.5 mr-1" /> History: {historyCount}</Badge>
                <Badge tone="slate"><Icon name="smartphone" className="w-3.5 h-3.5 mr-1" /> Mobile-ready</Badge>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <Card
              title="เลือก Jig"
              icon="layers"
              right={<Badge tone="blue">{done}/{total} done</Badge>}
            >
              <label className="text-sm font-semibold text-slate-700">Jig Number</label>
              <select
                value={jigNo}
                onChange={(e) => setJigNo(e.target.value)}
                className="mt-2 w-full rounded-xl border-slate-200 focus:border-sky-400 focus:ring-sky-200"
              >
                {jigs.map(j => (
                  <option key={j.jigNo} value={j.jigNo}>
                    {j.jigNo} — {j.partName || "N/A"}
                  </option>
                ))}
              </select>

              <div className="mt-4 grid grid-cols-2 gap-3 text-sm">
                <div className="rounded-xl bg-slate-50 ring-1 ring-slate-100 p-3">
                  <div className="text-xs font-semibold text-slate-500">Part Name</div>
                  <div className="mt-1 font-bold text-slate-800">{jig?.partName || "-"}</div>
                </div>
                <div className="rounded-xl bg-slate-50 ring-1 ring-slate-100 p-3">
                  <div className="text-xs font-semibold text-slate-500">Process / Model</div>
                  <div className="mt-1 font-bold text-slate-800">{jig?.process || "-"}{jig?.model ? ` • ${jig.model}` : ""}</div>
                </div>
              </div>

              <div className="mt-4">
                <label className="text-sm font-semibold text-slate-700">ผู้ตรวจ (Inspector)</label>
                <input
                  value={inspector}
                  onChange={(e)=>setInspector(e.target.value)}
                  placeholder="เช่น Somchai, Team A"
                  className="mt-2 w-full rounded-xl border-slate-200 focus:border-sky-400 focus:ring-sky-200"
                />
              </div>

              <div className="mt-4">
                <label className="text-sm font-semibold text-slate-700">หมายเหตุรวม (Optional)</label>
                <textarea
                  value={notes}
                  onChange={(e)=>setNotes(e.target.value)}
                  rows={3}
                  placeholder="บันทึกเพิ่มเติม..."
                  className="mt-2 w-full rounded-xl border-slate-200 focus:border-sky-400 focus:ring-sky-200"
                />
              </div>

              <div className="mt-4 flex items-center justify-between">
                <div className="text-sm">
                  <div className="font-semibold text-slate-700">NG Count: <span className="text-rose-700">{failCount}</span></div>
                  <div className="text-xs text-slate-500">ต้องตอบครบทุกข้อก่อนบันทึก</div>
                </div>
                <button
                  onClick={handleSave}
                  disabled={!canSave}
                  className={cls(
                    "inline-flex items-center gap-2 px-4 py-2 rounded-xl font-extrabold transition ring-1",
                    canSave ? "bg-sky-600 text-white ring-sky-600 hover:bg-sky-700" : "bg-slate-100 text-slate-400 ring-slate-200 cursor-not-allowed"
                  )}
                >
                  <Icon name="save" className="w-4 h-4" />
                  Save
                </button>
              </div>
            </Card>

            <div className="lg:col-span-2">
              <Card
                title="Check Points"
                icon="check-square"
                right={
                  <div className="flex items-center gap-2">
                    <Badge tone="green">OK</Badge>
                    <Badge tone="red">NG</Badge>
                  </div>
                }
              >
                {!jig ? (
                  <div className="text-slate-600">ไม่พบข้อมูล Jig</div>
                ) : (
                  <div className="space-y-4">
                    {groups.map(group => (
                      <div key={group.parent} className="rounded-2xl ring-1 ring-slate-200 bg-white overflow-hidden">
                        <div className="px-4 py-3 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
                          <div className="font-extrabold text-slate-800">{group.parent === "Main" ? "Main Items" : group.parent}</div>
                          <div className="text-xs font-semibold text-slate-500">{group.items.length} items</div>
                        </div>

                        <div className="divide-y divide-slate-100">
                          {group.items.map(cp => {
                            const a = answers[cp.id] || {};
                            const standardText = (() => {
                              const parts = [];
                              if (cp.standard != null) parts.push(`Std: ${cp.standard}`);
                              if (cp.max != null || cp.min != null) {
                                const mm = [];
                                if (cp.max != null) mm.push(`Max ${cp.max}`);
                                if (cp.min != null) mm.push(`Min ${cp.min}`);
                                parts.push(mm.join(" • "));
                              }
                              if (cp.method) parts.push(`Method: ${cp.method}`);
                              return parts.join(" • ");
                            })();
                            return (
                              <div key={cp.id} className="p-4">
                                <div className="flex items-start justify-between gap-4">
                                  <div className="min-w-0">
                                    <div className="flex items-center gap-2">
                                      <div className="font-bold text-slate-900 truncate">{cp.label}</div>
                                      {a.status === "OK" && <Badge tone="green">OK</Badge>}
                                      {a.status === "NG" && <Badge tone="red">NG</Badge>}
                                    </div>
                                    {standardText ? (
                                      <div className="mt-1 text-xs text-slate-600">{standardText}</div>
                                    ) : (
                                      <div className="mt-1 text-xs text-slate-400">—</div>
                                    )}
                                  </div>

                                  <div className="flex items-center gap-2 shrink-0">
                                    <PillButton tone="ok" active={a.status === "OK"} onClick={() => setStatus(cp, "OK")}>
                                      OK
                                    </PillButton>
                                    <PillButton tone="ng" active={a.status === "NG"} onClick={() => setStatus(cp, "NG")}>
                                      NG
                                    </PillButton>
                                  </div>
                                </div>

                                {a.status === "NG" && (
                                  <div className="mt-3 rounded-xl bg-rose-50 ring-1 ring-rose-100 p-3">
                                    <div className="text-xs font-extrabold text-rose-800 flex items-center gap-2">
                                      <Icon name="alert-triangle" className="w-4 h-4" />
                                      Remark / แนวทางการแก้ไข
                                    </div>
                                    <textarea
                                      value={a.remark || ""}
                                      onChange={(e)=>setRemark(cp, e.target.value)}
                                      rows={2}
                                      placeholder="อธิบายอาการ / สาเหตุ / การแก้ไข..."
                                      className="mt-2 w-full rounded-xl border-rose-200 focus:border-rose-400 focus:ring-rose-200 bg-white"
                                    />
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            </div>
          </div>

          <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-slate-200">
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
              <div className="text-sm">
                <div className="font-extrabold text-slate-900">{jigNo || "-"} <span className="text-slate-500 font-semibold">•</span> {jig?.partName || "-"}</div>
                <div className="text-xs text-slate-600">Progress: {done}/{total} • NG: {failCount}</div>
              </div>
              <button
                onClick={handleSave}
                disabled={!canSave}
                className={cls(
                  "inline-flex items-center gap-2 px-4 py-2 rounded-xl font-extrabold transition ring-1",
                  canSave ? "bg-sky-600 text-white ring-sky-600 hover:bg-sky-700" : "bg-slate-100 text-slate-400 ring-slate-200 cursor-not-allowed"
                )}
              >
                <Icon name="save" className="w-4 h-4" />
                Save
              </button>
            </div>
          </div>
        </div>
      );
    }

    function DashboardPage({ jigs, history, onClearHistory }) {
      const [rangeMode, setRangeMode] = useState("this_month"); // this_month | last_7 | all | custom
      const [customFrom, setCustomFrom] = useState(() => {
        const d = startOfMonth(new Date());
        return d.toISOString().slice(0,10);
      });
      const [customTo, setCustomTo] = useState(() => new Date().toISOString().slice(0,10));

      const [showInsights, setShowInsights] = useState(true);

      const { from, to } = useMemo(() => {
        const now = new Date();
        if (rangeMode === "this_month") return { from: startOfMonth(now), to: now };
        if (rangeMode === "last_7") return { from: new Date(now.getTime() - 7*24*60*60*1000), to: now };
        if (rangeMode === "all") return { from: new Date(2000,0,1), to: now };
        const f = new Date(customFrom + "T00:00:00");
        const t = new Date(customTo + "T23:59:59");
        return { from: f, to: t };
      }, [rangeMode, customFrom, customTo]);

      const filtered = useMemo(() => history.filter(h => within(h.timestamp, from, to)), [history, from, to]);

      const stats = useMemo(() => {
        const totalInspections = filtered.length;
        const pass = filtered.filter(x => x.overallStatus === "PASS").length;
        const fail = filtered.filter(x => x.overallStatus === "FAIL").length;

        const uniqueJigs = new Set(filtered.map(x => x.jigNo)).size;

        return { totalInspections, uniqueJigs, pass, fail };
      }, [filtered]);

      const topNG = useMemo(() => {
        const map = new Map(); // label -> count
        for (const h of filtered) {
          for (const r of (h.results || [])) {
            if (r.status === "NG") {
              const k = r.label;
              map.set(k, (map.get(k) || 0) + 1);
            }
          }
        }
        const arr = Array.from(map.entries()).map(([label, count]) => ({ label, count }));
        arr.sort((a,b)=> b.count - a.count);
        return arr.slice(0, 10);
      }, [filtered]);

      const insights = useMemo(() => buildInsights(history, from, to), [history, from, to]);

      const Recharts = window.Recharts || {};
      const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend, BarChart, Bar, XAxis, YAxis, CartesianGrid } = Recharts;

      const pieData = useMemo(() => ([
        { name: "PASS", value: stats.pass },
        { name: "FAIL", value: stats.fail },
      ]), [stats]);

      const barData = useMemo(() => topNG.map(x => ({ name: x.label.length > 18 ? x.label.slice(0,18)+"…" : x.label, full: x.label, count: x.count })), [topNG]);

      return (
        <div className="max-w-6xl mx-auto px-4 pb-12">
          <div className="pt-6 pb-4">
            <div className="flex items-start justify-between gap-4">
              <div>
                <div className="text-xs font-semibold text-slate-500">Preventive Maintenance • Dashboard</div>
                <div className="text-2xl font-extrabold tracking-tight">Dashboard & History (หัวหน้างาน)</div>
                <div className="mt-1 text-sm text-slate-600">สรุปผล, Top NG และ AI Insights จากประวัติ PM</div>
              </div>
              <div className="flex items-center gap-2">
                <button
                  onClick={onClearHistory}
                  className="inline-flex items-center gap-2 px-3 py-2 rounded-xl font-bold bg-white ring-1 ring-slate-200 hover:bg-slate-50"
                  title="ล้างข้อมูลประวัติ (LocalStorage)"
                >
                  <Icon name="trash-2" className="w-4 h-4 text-slate-600" />
                  Clear
                </button>
              </div>
            </div>

            <div className="mt-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <Segmented
                value={rangeMode}
                onChange={setRangeMode}
                options={[
                  { value:"this_month", label:"เดือนนี้" },
                  { value:"last_7", label:"7 วันล่าสุด" },
                  { value:"all", label:"ทั้งหมด" },
                  { value:"custom", label:"กำหนดเอง" }
                ]}
              />
              {rangeMode === "custom" && (
                <div className="flex items-center gap-2">
                  <div className="text-xs font-semibold text-slate-500">From</div>
                  <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} className="rounded-xl border-slate-200" />
                  <div className="text-xs font-semibold text-slate-500">To</div>
                  <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)} className="rounded-xl border-slate-200" />
                </div>
              )}
              <div className="text-xs font-semibold text-slate-500">
                Window: {from.toLocaleDateString("th-TH")} → {to.toLocaleDateString("th-TH")}
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
            <Stat label="PM Inspections" value={stats.totalInspections} tone="blue" icon="clipboard-list" />
            <Stat label="Jigs PM แล้ว" value={stats.uniqueJigs} tone="slate" icon="layers" />
            <Stat label="PASS" value={stats.pass} tone="green" icon="check-circle" />
            <Stat label="FAIL" value={stats.fail} tone="red" icon="x-circle" />
          </div>

          <div className="mt-4 grid grid-cols-1 lg:grid-cols-3 gap-4">
            <Card title="Overall Status" icon="pie-chart" right={<Badge tone="blue">PASS vs FAIL</Badge>}>
              {PieChart ? (
                <div className="h-56">
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={pieData} dataKey="value" nameKey="name" innerRadius={55} outerRadius={85} paddingAngle={4}>
                        {/* No custom colors requested by user; using defaults. */}
                        {pieData.map((entry, index) => <Cell key={`cell-${index}`} />)}
                      </Pie>
                      <Tooltip />
                      <Legend />
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              ) : (
                <div className="text-slate-600">Recharts ไม่พร้อมใช้งาน</div>
              )}
              <div className="mt-3 text-xs text-slate-500">
                * กราฟใช้ Recharts ผ่าน CDN (ไม่ต้องติดตั้ง)
              </div>
            </Card>

            <Card
              title="Top NG Items"
              icon="bar-chart-3"
              right={<Badge tone="amber">{topNG.length ? "Top 10" : "No NG"}</Badge>}
            >
              {BarChart ? (
                <div className="h-56">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={barData} margin={{ left: 0, right: 8, top: 8, bottom: 24 }}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="name" interval={0} angle={-20} textAnchor="end" height={60} />
                      <YAxis allowDecimals={false} />
                      <Tooltip formatter={(v, n, p) => [v, p.payload.full]} />
                      <Bar dataKey="count" />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              ) : (
                <div className="text-slate-600">Recharts ไม่พร้อมใช้งาน</div>
              )}
              <div className="mt-3 text-xs text-slate-500">
                แสดง NG ที่พบซ้ำบ่อยสุดจากช่วงเวลาที่เลือก
              </div>
            </Card>

            <Card
              title="AI Insights (Smart Analysis)"
              icon="sparkles"
              right={
                <button
                  onClick={() => setShowInsights(v => !v)}
                  className="inline-flex items-center gap-2 px-3 py-1.5 rounded-xl bg-white ring-1 ring-slate-200 hover:bg-slate-50 text-sm font-bold"
                >
                  <Icon name={showInsights ? "eye-off" : "eye"} className="w-4 h-4 text-slate-600" />
                  {showInsights ? "Hide" : "Show"}
                </button>
              }
            >
              {showInsights && (
                <div className="space-y-3">
                  {insights.map((m, idx) => {
                    const tone =
                      m.type === "anomaly" ? "red" :
                      m.type === "trend_up" ? "amber" :
                      m.type === "trend_down" ? "green" :
                      m.type === "ok" ? "green" :
                      m.type === "hint" ? "violet" : "blue";
                    const icon =
                      m.type === "anomaly" ? "alert-triangle" :
                      m.type === "trend_up" ? "trending-up" :
                      m.type === "trend_down" ? "trending-down" :
                      m.type === "ok" ? "check-circle-2" :
                      m.type === "hint" ? "lightbulb" : "info";
                    return (
                      <div key={idx} className={cls("rounded-2xl ring-1 p-3 bg-white", tone==="red"?"ring-rose-200 bg-rose-50":tone==="green"?"ring-emerald-200 bg-emerald-50":tone==="amber"?"ring-amber-200 bg-amber-50":tone==="violet"?"ring-violet-200 bg-violet-50":"ring-sky-200 bg-sky-50")}>
                        <div className="flex items-start gap-2">
                          <Icon name={icon} className="w-4 h-4 mt-0.5 opacity-80" />
                          <div className="min-w-0">
                            <div className="font-extrabold text-sm">{m.title}</div>
                            <div className="mt-1 text-xs text-slate-700">{m.detail}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  <div className="text-[11px] text-slate-500">
                    * AI ที่นี่เป็น Logic จำลอง (Rule-based) เพื่อทำ Anomaly/Trend ได้ทันทีโดยไม่ต้องใช้ API
                  </div>
                </div>
              )}
              {!showInsights && (
                <div className="text-slate-600">ซ่อน Insights อยู่</div>
              )}
            </Card>
          </div>

          <div className="mt-4">
            <Card
              title="History Log"
              icon="history"
              right={<Badge tone="blue">{filtered.length} records</Badge>}
            >
              {filtered.length === 0 ? (
                <div className="text-slate-600">ยังไม่มีประวัติในช่วงเวลานี้</div>
              ) : (
                <div className="overflow-auto">
                  <table className="min-w-full text-sm">
                    <thead>
                      <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-200">
                        <th className="py-2 pr-4">Time</th>
                        <th className="py-2 pr-4">Inspector</th>
                        <th className="py-2 pr-4">Jig</th>
                        <th className="py-2 pr-4">Part</th>
                        <th className="py-2 pr-4">Status</th>
                        <th className="py-2 pr-4">NG</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {filtered.slice(0, 200).map(row => {
                        const ng = (row.results || []).filter(r=>r.status==="NG").length;
                        return (
                          <tr key={row.id} className="hover:bg-slate-50">
                            <td className="py-2 pr-4 whitespace-nowrap">{fmtDateTime(row.timestamp)}</td>
                            <td className="py-2 pr-4 whitespace-nowrap font-semibold">{row.inspector}</td>
                            <td className="py-2 pr-4 whitespace-nowrap font-extrabold">{row.jigNo}</td>
                            <td className="py-2 pr-4 min-w-[240px]">{row.partName || "-"}</td>
                            <td className="py-2 pr-4">
                              {row.overallStatus === "PASS" ? <Badge tone="green">PASS</Badge> : <Badge tone="red">FAIL</Badge>}
                            </td>
                            <td className="py-2 pr-4">
                              {ng > 0 ? <Badge tone="red">{ng}</Badge> : <Badge tone="green">0</Badge>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>

                  {filtered.length > 200 && (
                    <div className="mt-3 text-xs text-slate-500">
                      แสดง 200 รายการแรก (ทั้งหมด {filtered.length})
                    </div>
                  )}
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    }

    /*************************************************************
     * 6) App Shell
     *************************************************************/
    function App() {
      // IMPORTANT: if the full dataset placeholder is not replaced, fallback to minimal set
      const jigs = useMemo(() => {
        const ok = Array.isArray(JIGS_ALL) && JIGS_ALL.length > 1;
        return ok ? JIGS_ALL : (Array.isArray(JIGS) ? JIGS.filter(Boolean) : []);
      }, []);

      const [page, setPage] = useState("input"); // input | dashboard
      const [history, setHistory] = useState(() => loadHistory());

      useEffect(() => {
        // render lucide icons
        if (window.lucide && window.lucide.createIcons) {
          window.lucide.createIcons();
        }
      });

      function refreshHistory() {
        setHistory(loadHistory());
      }

      function onSaved() {
        refreshHistory();
        setPage("dashboard");
      }

      function clearHistory() {
        if (!confirm("ต้องการล้าง History ทั้งหมดในเครื่องนี้ (localStorage) ใช่ไหม?")) return;
        saveHistory([]);
        setHistory([]);
      }

      return (
        <div className="min-h-screen">
          <header className="sticky top-0 z-40 bg-white/80 backdrop-blur border-b border-slate-200">
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-2xl bg-sky-600 text-white flex items-center justify-center shadow-sm">
                  <Icon name="wrench" className="w-5 h-5" />
                </div>
                <div className="min-w-0">
                  <div className="font-extrabold leading-tight truncate">PM Web Application</div>
                  <div className="text-xs text-slate-500 truncate">Preventive Maintenance • Single-file React + Tailwind + Lucide + Recharts</div>
                </div>
              </div>

              <nav className="flex items-center gap-2">
                <button
                  onClick={() => setPage("input")}
                  className={cls(
                    "px-3 py-2 rounded-xl font-extrabold ring-1 transition",
                    page === "input" ? "bg-sky-600 text-white ring-sky-600" : "bg-white text-slate-700 ring-slate-200 hover:bg-slate-50"
                  )}
                >
                  <span className="inline-flex items-center gap-2">
                    <Icon name="clipboard-check" className="w-4 h-4" />
                    Input
                  </span>
                </button>
                <button
                  onClick={() => setPage("dashboard")}
                  className={cls(
                    "px-3 py-2 rounded-xl font-extrabold ring-1 transition",
                    page === "dashboard" ? "bg-sky-600 text-white ring-sky-600" : "bg-white text-slate-700 ring-slate-200 hover:bg-slate-50"
                  )}
                >
                  <span className="inline-flex items-center gap-2">
                    <Icon name="layout-dashboard" className="w-4 h-4" />
                    Dashboard
                  </span>
                </button>

                <div className="hidden md:flex items-center gap-2 ml-2">
                  <Badge tone="blue"><Icon name="layers" className="w-3.5 h-3.5 mr-1" /> Jigs: {jigs.length}</Badge>
                  <Badge tone="slate"><Icon name="database" className="w-3.5 h-3.5 mr-1" /> History: {history.length}</Badge>
                </div>
              </nav>
            </div>
          </header>

          <main>
            {page === "input" ? (
              <InputPage jigs={jigs} onSaved={onSaved} historyCount={history.length} />
            ) : (
              <DashboardPage jigs={jigs} history={history} onClearHistory={clearHistory} />
            )}
          </main>

          <footer className="py-8 text-center text-xs text-slate-500">
            Data stored locally (localStorage) • พร้อมต่อยอดเชื่อม API/DB จริง (MySQL/Postgres/Firebase) ได้
          </footer>
        </div>
      );
    }

    /*************************************************************
     * 7) Mount
     *************************************************************/
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
