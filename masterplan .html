<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Masterplan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#f2f2f2;--bg2:#ffffff;--bg3:#f7f7f7;--card:#ffffff;
  --border:#e0e0e0;--border2:#cccccc;
  --accent:#e31937;--accent-dim:rgba(227,25,55,0.08);
  --cyan:#0066cc;--green:#22c55e;--red:#e31937;--purple:#a855f7;--amber:#f59e0b;
  --text:#121212;--text2:#404040;--muted:#7a7a7a;--muted2:#a0a0a0;
  --pd3:#1a6dcc;--pd3-bg:#f0f5ff;--pd3-border:#d0e2fc;
  --pd4:#cc8800;--pd4-bg:#fdf6ee;--pd4-border:#f0ddb0;
  --sidebar:252px;--radius:4px;--radius-sm:3px;
  --font-body:'Sarabun',sans-serif;--font-display:'Inter',sans-serif;

  /* legacy aliases used throughout file */
  --s1:var(--bg3);--s2:var(--card);--s3:#f0f0f0;
  --bd:var(--border);--bd2:var(--border2);
  --txt:var(--text);--acc:var(--accent);
  --grn:var(--green);--blu:var(--pd3);--pur:var(--purple);--cyn:var(--cyan);

  --proj-h:64px;
  --phase-h:52px;
  --task-h:42px;
  --lbl-w:340px;
}

[data-theme="dark"]{
  --bg:#050505;--bg2:#0a0a0a;--bg3:#111111;--card:#0d0d0d;
  --border:#1e1e1e;--border2:#2a2a2a;
  --accent:#e31937;--accent-dim:rgba(227,25,55,0.10);
  --text:#ffffff;--text2:#a8a8a8;--muted:#555555;--muted2:#333333;
  --pd3:#4d9fff;--pd3-bg:rgba(77,159,255,0.08);--pd3-border:rgba(77,159,255,0.22);
  --pd4:#ffaa40;--pd4-bg:rgba(255,170,64,0.08);--pd4-border:rgba(255,170,64,0.22);
  --green:#22c55e;--amber:#f59e0b;
  --s1:var(--bg3);--s2:#0d0d0d;--s3:#161616;
  --bd:var(--border);--bd2:var(--border2);
  --txt:var(--text);--acc:var(--accent);
  --grn:var(--green);--blu:var(--pd3);--pur:var(--purple);--cyn:var(--cyan);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;padding:0;font-size:20px;}

/* ══ HEADER ══ */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-icon{width:36px;height:36px;background:var(--accent);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hdr-text h1{font-size:clamp(22px,3.5vw,30px);font-weight:700;letter-spacing:-.3px;}
.hdr-text h1 em{color:var(--acc);font-style:normal;}
.hdr-meta{font-size:17px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.sync-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:2px;font-size:15px;font-family:var(--font-display);}
.sync-pill.idle{background:rgba(94,122,150,.15);color:var(--muted);}
.sync-pill.ok{background:rgba(34,197,94,.12);color:var(--green);}
.sync-pill.err{background:var(--accent-dim);color:var(--red);}
.sync-pill.loading{background:rgba(245,158,11,.12);color:var(--amber);}
.sdot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.loading .sdot{animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.hdr-btns{display:flex;gap:6px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:17px;font-family:var(--font-body);font-weight:600;transition:all .15s;}
.btn:hover{filter:brightness(1.1);}
.btn-acc{background:var(--acc);color:#000;}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--bd);}
.btn-ghost:hover{color:var(--txt);border-color:var(--bd2);}
.btn-grn{background:rgba(62,207,114,.12);color:var(--grn);border:1px solid rgba(62,207,114,.25);}
.btn-sm{padding:7px 14px;font-size:15px;}

/* ══ API BANNER ══ */
.api-bar{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:6px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.api-bar.hidden{display:none;}
.api-bar input{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--bd);color:var(--txt);padding:6px 9px;border-radius:4px;font-size:14px;font-family:var(--font-display);outline:none;}
.api-bar input:focus{border-color:var(--acc);}

/* ══ SUMMARY ══ */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:18px;}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:7px;padding:14px 10px;text-align:center;}
.kpi .n{font-size:36px;font-weight:700;font-family:var(--font-display);line-height:1;}
.kpi .l{font-size:15px;color:var(--muted);margin-top:4px;letter-spacing:.3px;}

/* ══ TOOLBAR ══ */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.toolbar-left{display:flex;gap:6px;}
.week-label-row{font-size:11px;color:var(--muted);font-family:var(--font-display);}

/* ══ GANTT WRAPPER ══ */
.gantt-outer{overflow-x:auto;border:1px solid var(--bd);border-radius:8px;background:var(--s1);}
.gantt-inner{min-width:700px;}

/* header row */
.g-head{display:flex;border-bottom:2px solid var(--bd2);position:sticky;top:0;z-index:10;background:var(--s1);}
.g-head-lbl{width:var(--lbl-w);min-width:var(--lbl-w);padding:10px 14px;font-size:15px;color:var(--muted);font-family:var(--font-display);letter-spacing:.5px;border-right:1px solid var(--bd);flex-shrink:0;}
.g-head-weeks{flex:1;display:grid;position:relative;}
.g-wk{text-align:center;padding:6px 2px;font-size:15px;font-family:var(--font-display);color:var(--muted);border-right:1px solid var(--bd);line-height:1.4;}
.g-wk:last-child{border-right:none;}
.g-wk.cur{color:var(--acc);font-weight:600;background:rgba(245,166,35,.05);}

/* ── ROW TYPES ── */
.g-row{display:flex;border-bottom:1px solid var(--bd);transition:background .12s;}

/* PROJECT row */
.g-row.proj{background:var(--s2);cursor:pointer;}
.g-row.proj:hover{background:var(--s3);}
.g-row.proj .g-lbl{background:var(--s2);border-right:2px solid var(--acc);}

/* PHASE row */
.g-row.phase{background:var(--s1);cursor:pointer;}
.g-row.phase:hover{background:var(--s2);}
.g-row.phase .g-lbl{border-right:2px solid var(--blu);padding-left:22px;}

/* TASK row */
.g-row.task-row{background:var(--bg);}
.g-row.task-row .g-lbl{padding-left:40px;border-right:1px solid var(--bd);}

/* label cell */
.g-lbl{width:var(--lbl-w);min-width:var(--lbl-w);display:flex;align-items:center;gap:6px;padding:0 10px;flex-shrink:0;position:relative;}
.expand-arrow{font-size:16px;color:var(--muted);transition:transform .2s;flex-shrink:0;width:18px;text-align:center;}
.expand-arrow.open{transform:rotate(90deg);}
.row-name{flex:1;font-size:18px;line-height:1.3;overflow:hidden;}
.proj .row-name{font-size:20px;font-weight:700;color:var(--txt);}
.phase .row-name{font-size:17px;font-weight:600;color:var(--blu);}
.task-row .row-name{font-size:16px;color:var(--muted);font-weight:400;}
.row-owner{font-size:15px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-actions-g{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.g-lbl:hover .row-actions-g{opacity:1;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:3px 5px;border-radius:3px;font-size:16px;line-height:1;}
.icon-btn:hover{color:var(--txt);background:var(--s3);}

/* bar area */
.g-bars{flex:1;position:relative;overflow:hidden;}
.g-bars::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(90deg,transparent,transparent calc(100%/var(--wks) - 1px),var(--bd) calc(100%/var(--wks) - 1px),var(--bd) calc(100%/var(--wks)));
  opacity:.4;
}
.cur-vline{position:absolute;top:0;bottom:0;width:2px;background:var(--acc);opacity:.4;z-index:1;pointer-events:none;}

/* bars */
.bar{position:absolute;border-radius:3px;display:flex;align-items:center;padding:0 8px;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:2;cursor:default;top:50%;transform:translateY(-50%);}
.bar:hover{filter:brightness(1.25);z-index:5;}

.bar-proj{height:22px;background:var(--accent-dim);border:1px solid rgba(227,25,55,.35);color:var(--accent);font-size:14px;}
.bar-phase{height:16px;background:var(--pd3-bg);border:1px solid var(--pd3-border);color:var(--pd3);font-size:14px;}
.bar-done   {height:26px;background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.5);color:var(--green);}
.bar-inprog {height:26px;
  background:repeating-linear-gradient(45deg,var(--accent-dim),var(--accent-dim) 4px,transparent 4px,transparent 8px);
  border:1px solid rgba(227,25,55,.4);color:var(--accent);}
.bar-pending{height:26px;background:var(--pd3-bg);border:1px solid var(--pd3-border);color:var(--pd3);}
.bar-blocked{height:26px;background:var(--accent-dim);border:1px solid rgba(227,25,55,.3);color:var(--red);}

.mstone{position:absolute;width:14px;height:14px;transform:translate(-50%,-50%) rotate(45deg);background:var(--accent);border:1px solid rgba(227,25,55,.8);z-index:4;}

/* progress fill inside summary bars */
.bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:3px;opacity:.35;}
.fill-grn{background:var(--grn);}
.fill-acc{background:var(--acc);}

/* status badge */
.sbadge{display:inline-block;font-size:10px;font-family:var(--font-display);padding:1px 4px;border-radius:2px;flex-shrink:0;}
.sb-done   {background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.sb-inprog {background:var(--accent-dim);color:var(--accent);border:1px solid rgba(227,25,55,.3);}
.sb-pending{background:var(--pd3-bg);color:var(--pd3);border:1px solid var(--pd3-border);}
.sb-blocked{background:var(--accent-dim);color:var(--red);border:1px solid rgba(227,25,55,.3);}

/* row heights */
.g-row.proj    { min-height:var(--proj-h); }
.g-row.phase   { min-height:var(--phase-h); }
.g-row.task-row{ min-height:var(--task-h); }

/* collapsed */
.g-row.collapsed-child{display:none;}

/* ══ MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:14px;}
.modal{background:var(--s2);border:1px solid var(--bd2);border-radius:9px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);}
.modal-hdr h2{font-size:20px;font-weight:700;}
.modal-body{padding:16px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:15px;color:var(--muted);margin-bottom:4px;font-family:var(--font-display);letter-spacing:.6px;text-transform:uppercase;}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--bd);color:var(--txt);padding:10px 12px;border-radius:var(--radius-sm);font-size:18px;font-family:var(--font-body);outline:none;transition:border .15s;}
.field input:focus,.field textarea:focus{border-color:var(--acc);}
.field select{cursor:pointer;}
.field textarea{resize:vertical;min-height:56px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-foot{display:flex;gap:7px;justify-content:flex-end;padding:12px 16px;border-top:1px solid var(--bd);}
.sec-lbl{font-size:14px;font-family:var(--font-display);letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;margin-top:4px;}
.type-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--bd);border-radius:5px;overflow:hidden;}
.type-tab{flex:1;padding:10px;text-align:center;font-size:17px;cursor:pointer;background:none;border:none;color:var(--muted);font-family:var(--font-body);transition:all .15s;}
.type-tab.active{background:var(--acc);color:#000;font-weight:600;}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--bd2);color:var(--txt);padding:12px 22px;border-radius:var(--radius-sm);font-size:18px;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
.toast.show{opacity:1;}

.hidden{display:none!important;}

/* ── SIDEBAR NAV ── */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:100;flex-shrink:0}
#sidebar-toggle{position:fixed;top:50vh;left:calc(var(--sidebar) - 16px);z-index:200;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s}
body.sidebar-collapsed #sidebar-toggle{left:10px}
#sidebar-toggle:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#sidebar-edge{position:fixed;left:0;top:0;bottom:0;width:24px;z-index:99;pointer-events:none;}
body.sidebar-collapsed #sidebar-edge{pointer-events:auto}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;backdrop-filter:blur(2px)}
body.sidebar-collapsed #sidebar{transform:translateX(calc(-1 * var(--sidebar)));position:fixed}
body.sidebar-collapsed #main-wrap{margin-left:0}
body.sidebar-collapsed #sidebar-overlay{display:none}
.nav-section{padding:12px 14px 6px;font-size:11px;letter-spacing:1.5px;color:var(--muted);font-family:var(--font-display);text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:15px;color:var(--muted);text-decoration:none;border:1px solid transparent;transition:all .18s;background:none;width:100%;text-align:left;font-family:var(--font-body);font-weight:500}
.nav-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.nav-btn.active{background:var(--accent-dim);border-color:rgba(227,25,55,.2);color:var(--accent);font-weight:600}
.nav-logo{padding:18px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.nav-logo-icon{width:32px;height:32px;background:var(--accent);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.nav-logo-text{font-size:16px;font-weight:700;color:var(--text);line-height:1.2;font-family:var(--font-display)}
.nav-logo-sub{font-size:12px;color:var(--muted)}
#main-wrap{flex:1;overflow:auto;min-width:0;padding:24px 20px 80px}
#noise-overlay{position:fixed;inset:0;pointer-events:none;z-index:2;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}[data-theme="light"] #noise-overlay{opacity:.014}
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;height:100vh;transform:translateX(calc(-1 * var(--sidebar)));transition:transform .28s cubic-bezier(.4,0,.2,1)}
  body.sidebar-open #sidebar{transform:translateX(0)}
  body.sidebar-open #sidebar-overlay{display:block}
  #sidebar-toggle{display:flex}
  body{padding:16px 12px 60px}
}
@media(min-width:769px){
  #sidebar{transition:transform .28s cubic-bezier(.4,0,.2,1)}
  #sidebar-toggle{display:flex}
}
@media(max-width:600px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .gantt-outer{font-size:15px}
  body{font-size:18px}
}
</style>
</head>
<body>
<div id="noise-overlay"></div>
<div id="sidebar-edge"></div>
<button id="sidebar-toggle" onclick="toggleSidebar()" title="Pin sidebar">☰</button>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="app">
<aside id="sidebar">
  <div class="nav-logo">
    <div class="nav-logo-icon"></div>
    <div><div class="nav-logo-text">OEE Dashboard</div><div class="nav-logo-sub">Production Monitor</div></div>
  </div>
  <div class="nav-section">Overview</div>
  <a class="nav-btn" href="overview.html">Combined Overview</a>
  <a class="nav-btn" href="summary.html">Summary Dashboard</a>
  <div class="nav-section">PD3</div>
  <a class="nav-btn" href="oee_pd3.html">PD3 Overview</a>
  <a class="nav-btn" href="oee_deep_pd3.html">Deep Analysis PD3</a>
  <div class="nav-section">PD4</div>
  <a class="nav-btn" href="oee_pd4.html">PD4 Overview</a>
  <a class="nav-btn" href="oee_deep_pd4.html">Deep Analysis PD4</a>
  <div class="nav-section">Planning</div>
  <a class="nav-btn active" href="masterplan .html">Masterplan</a>
</aside>
<div id="main-wrap">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-icon"></div>
    <div class="hdr-text">
      <h1>Project <em>Masterplan</em></h1>
      <div class="hdr-meta">
        <span id="sync-pill" class="sync-pill idle"><span class="sdot"></span><span id="sync-txt">Offline</span></span>
        <span id="updated-at"></span>
      </div>
    </div>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-ghost btn-sm" onclick="toggleApiBar()">Sheets</button>
    <button class="btn btn-ghost btn-sm" id="btn-pull" onclick="pullSheets()" style="display:none">↓ Pull</button>
    <button class="btn btn-grn btn-sm"   id="btn-push" onclick="pushSheets()" style="display:none">↑ Push</button>
    <button class="btn btn-ghost btn-sm" onclick="collapseAll()">− ย่อทั้งหมด</button>
    <button class="btn btn-ghost btn-sm" onclick="expandAll()">+ ขยายทั้งหมด</button>
    <button class="btn btn-acc" onclick="openModal('project')">+ Project</button>
  </div>
</div>

<!-- API BAR -->
<div class="api-bar hidden" id="api-bar">
  <span style="font-size:13px;color:var(--accent);white-space:nowrap;">Apps Script URL:</span>
  <input id="api-url-inp" type="text" placeholder="https://script.google.com/macros/s/…/exec">
  <button class="btn btn-acc btn-sm" onclick="saveApiUrl()">เชื่อมต่อ</button>
  <button class="btn btn-ghost btn-sm" onclick="toggleApiBar()">✕</button>
</div>

<!-- KPI -->
<div class="kpi-row" id="kpi-row"></div>

<!-- GANTT -->
<div class="gantt-outer">
  <div class="gantt-inner" id="gantt-inner"></div>
</div>

<!-- MODAL -->
<div class="overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modal-title">เพิ่มรายการ</h2>
      <button class="icon-btn" onclick="closeModal()" style="font-size:20px;">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-type">
      <input type="hidden" id="f-id">
      <input type="hidden" id="f-parent-proj">
      <input type="hidden" id="f-parent-phase">

      <!-- add-type chooser (shown only when adding new) -->
      <div id="type-chooser" class="hidden">
        <div class="sec-lbl">ประเภท</div>
        <div class="type-tabs">
          <button class="type-tab" onclick="setType('project')">Project</button>
          <button class="type-tab" onclick="setType('phase')">Phase</button>
          <button class="type-tab" onclick="setType('task')">Task</button>
        </div>
      </div>

      <div class="field"><label>ชื่อ *</label><input id="f-name" placeholder="ชื่อ Project / Phase / Task"></div>
      <div class="field" id="f-sub-wrap"><label>คำอธิบายย่อ</label><input id="f-sub" placeholder="Line 297 / รายละเอียดย่อ"></div>

      <!-- phase parent selector -->
      <div class="field hidden" id="f-proj-wrap">
        <label>สังกัด Project</label>
        <select id="f-proj-sel"></select>
      </div>

// ══════════════════════════════════════════════════════
// STATE

let addType = 'project';

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init() {
  const raw = localStorage.getItem('mp_v4');
  data = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_DATA));

    document.getElementById('api-url-inp').value = apiUrl;

function saveLocal() {
  localStorage.setItem('mp_v4', JSON.stringify(data));
}

// ══════════════════════════════════════════════════════
// CALC HELPERS
// ══════════════════════════════════════════════════════
function taskSpan(tasks) {
  if (!tasks.length) return {start:1, end:1, dur:0};
  const s = Math.min(...tasks.map(t=>t.start));
  const e = Math.max(...tasks.map(t=>t.start + t.dur));
  return {start:s, end:e, dur:e-s};
}
function phaseSpan(phase) { return taskSpan(phase.tasks); }
function projectSpan(proj) {
  const allTasks = proj.phases.flatMap(ph=>ph.tasks);
  return taskSpan(allTasks);
}
function taskProgress(tasks) {
  if (!tasks.length) return 0;
  const done = tasks.filter(t=>t.status==='done').length;
  return Math.round((done/tasks.length)*100);
}
function pct(week0based, frac=0) { return ((week0based + frac) / WEEKS) * 100; }

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render() {
  renderKPI();
  renderGantt();
}

function renderKPI() {
  const allTasks = data.projects.flatMap(p=>p.phases.flatMap(ph=>ph.tasks));
  const c = {done:0,inprog:0,pending:0,blocked:0};
  allTasks.forEach(t=>c[t.status]++);
  const pct100 = allTasks.length ? Math.round((c.done/allTasks.length)*100) : 0;
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi"><div class="n" style="color:var(--txt)">${data.projects.length}</div><div class="l">PROJECTS</div></div>
    <div class="kpi"><div class="n" style="color:var(--txt)">${allTasks.length}</div><div class="l">TASKS</div></div>
    <div class="kpi"><div class="n" style="color:var(--grn)">${c.done}</div><div class="l">DONE</div></div>
    <div class="kpi"><div class="n" style="color:var(--acc)">${c.inprog}</div><div class="l">IN PROGRESS</div></div>
    <div class="kpi"><div class="n" style="color:var(--blu)">${c.pending}</div><div class="l">PENDING</div></div>
    <div class="kpi"><div class="n" style="color:var(--grn)">${pct100}%</div><div class="l">COMPLETE</div></div>`;
}

function renderGantt() {
  const curLinePct = pct(CUR_WEEK, 0.5).toFixed(2);

  // header
  const wkCols = WEEK_LABELS.map((w,i)=>
    `<div class="g-wk${i===CUR_WEEK?' cur':''}">${w.w}<br><span style="font-size:8px">${w.d}</span></div>`
  ).join('');

  let html = `
    <div class="g-head">
      <div class="g-head-lbl">PROJECT / PHASE / TASK</div>
      <div class="g-head-weeks" style="display:grid;grid-template-columns:repeat(${WEEKS},1fr);">${wkCols}</div>
    </div>`;

  data.projects.forEach((proj, pi) => {
    const pSpan  = projectSpan(proj);
    const pProg  = taskProgress(proj.phases.flatMap(ph=>ph.tasks));
    const pStart = pct(pSpan.start - 1).toFixed(2);
    const pDur   = pct(0, pSpan.dur).toFixed(2);
    const projId = `proj-${proj.id}`;

    html += `
      <div class="g-row proj" id="row-${proj.id}" onclick="toggleProject('${proj.id}')">
        <div class="g-lbl" style="min-height:var(--proj-h)">
          <span class="expand-arrow ${proj.collapsed?'':'open'}" id="arr-${proj.id}">▶</span>
          <div style="flex:1;min-width:0;">
            <div class="row-name">${proj.name}</div>
            ${proj.sub?`<div class="row-owner">${proj.sub}</div>`:''}
          </div>
          <div class="row-actions-g" onclick="event.stopPropagation()">
            <button class="icon-btn" title="เพิ่ม Phase" onclick="openModal('phase','${proj.id}')">+Ph</button>
            <button class="icon-btn" title="แก้ไข" onclick="openEdit('project','${proj.id}')">✏</button>
            <button class="icon-btn" style="color:var(--red)" title="ลบ" onclick="deleteItem('project','${proj.id}')">🗑</button>
          </div>
        </div>
        <div class="g-bars" style="--wks:${WEEKS};min-height:var(--proj-h);">
          <div class="cur-vline" style="left:${curLinePct}%"></div>
          ${pSpan.dur > 0 ? `
          <div class="bar bar-proj" style="left:${pStart}%;width:${pDur}%;">
            <div class="bar-fill fill-acc" style="width:${pProg}%"></div>
            ${pProg}%
          </div>` : ''}
        </div>
      </div>`;

    proj.phases.forEach((phase, phi) => {
      const phSpan  = phaseSpan(phase);
      const phProg  = taskProgress(phase.tasks);
      const phStart = pct(phSpan.start - 1).toFixed(2);
      const phDur   = pct(0, phSpan.dur).toFixed(2);
      const childCls= proj.collapsed ? 'collapsed-child' : '';

      html += `
        <div class="g-row phase ${childCls}" id="row-${phase.id}" data-proj="${proj.id}" onclick="togglePhase('${proj.id}','${phase.id}')">
          <div class="g-lbl" style="min-height:var(--phase-h)">
            <span class="expand-arrow ${phase.collapsed?'':'open'}" id="arr-${phase.id}">▶</span>
            <div style="flex:1;min-width:0;">
              <div class="row-name">${phase.name}</div>
            </div>
            <div class="row-actions-g" onclick="event.stopPropagation()">
              <button class="icon-btn" title="เพิ่ม Task" onclick="openModal('task','${proj.id}','${phase.id}')">+T</button>
              <button class="icon-btn" title="แก้ไข" onclick="openEdit('phase','${proj.id}','${phase.id}')">✏</button>
              <button class="icon-btn" style="color:var(--red)" title="ลบ" onclick="deleteItem('phase','${proj.id}','${phase.id}')">🗑</button>
            </div>
          </div>
          <div class="g-bars" style="--wks:${WEEKS};min-height:var(--phase-h);">
            <div class="cur-vline" style="left:${curLinePct}%"></div>
            ${phSpan.dur > 0 ? `
            <div class="bar bar-phase" style="left:${phStart}%;width:${phDur}%;">
              <div class="bar-fill fill-grn" style="width:${phProg}%"></div>
              ${phProg}%
            </div>` : ''}
          </div>
        </div>`;

      phase.tasks.forEach(task => {
        const sm     = STATUS_MAP[task.status] || STATUS_MAP.pending;
        const ts     = pct(task.start - 1).toFixed(2);
        const td     = pct(0, task.dur).toFixed(2);
        const milePct= task.mile ? pct(task.mile - 0.5).toFixed(2) : null;
        const taskChildCls = (proj.collapsed || phase.collapsed) ? 'collapsed-child' : '';

        html += `
          <div class="g-row task-row ${taskChildCls}" data-proj="${proj.id}" data-phase="${phase.id}">
            <div class="g-lbl" style="min-height:var(--task-h)">
              <div style="flex:1;min-width:0;">
                <div class="row-name">${task.name}</div>
                <div class="row-owner">${task.owner||''} ${task.owner&&task.status?'·':''} <span class="sbadge ${sm.cls}">${sm.label}</span></div>
              </div>
              <div class="row-actions-g">
                <button class="icon-btn" onclick="openEdit('task','${proj.id}','${phase.id}','${task.id}')">✏</button>
                <button class="icon-btn" style="color:var(--red)" onclick="deleteItem('task','${proj.id}','${phase.id}','${task.id}')">🗑</button>
              </div>
            </div>
            <div class="g-bars" style="--wks:${WEEKS};min-height:var(--task-h);">
              <div class="cur-vline" style="left:${curLinePct}%"></div>
              <div class="bar ${sm.bar}" style="left:${ts}%;width:${td}%;" title="${task.name}${task.next?' · '+task.next:''}">
                ${task.name.length>20?task.name.slice(0,18)+'…':task.name}
              </div>
              ${milePct!==null?`<div class="mstone" style="left:${milePct}%;top:50%;"></div>`:''}
            </div>
          </div>`;
      });
    });
  });

  document.getElementById('gantt-inner').innerHTML = html;
}

// ══════════════════════════════════════════════════════
// COLLAPSE / EXPAND
// ══════════════════════════════════════════════════════
function toggleProject(projId) {
  const proj = data.projects.find(p=>p.id===projId);
  proj.collapsed = !proj.collapsed;
  saveLocal(); render();
}
function togglePhase(projId, phaseId) {
  const proj  = data.projects.find(p=>p.id===projId);
  const phase = proj.phases.find(ph=>ph.id===phaseId);
  phase.collapsed = !phase.collapsed;
  saveLocal(); render();
}
function collapseAll() {
  data.projects.forEach(p=>{p.collapsed=true; p.phases.forEach(ph=>ph.collapsed=true);});
  saveLocal(); render();
}
function expandAll() {
  data.projects.forEach(p=>{p.collapsed=false; p.phases.forEach(ph=>ph.collapsed=false);});
  saveLocal(); render();
}

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
function openModal(type, projId='', phaseId='') {
  editCtx = null;
  document.getElementById('modal-title').textContent = 'เพิ่มรายการใหม่';
  document.getElementById('f-id').value = '';
  document.getElementById('f-parent-proj').value  = projId;
  document.getElementById('f-parent-phase').value = phaseId;
  // clear fields
  ['f-name','f-sub','f-owner','f-next','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='pending';
  document.getElementById('f-start').value='1';
  document.getElementById('f-dur').value='1';
  document.getElementById('f-mile').value='0';

  // chooser
  document.getElementById('type-chooser').classList.remove('hidden');
  setType(type);
  populateParentSelects(projId, phaseId);

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function openEdit(type, projId, phaseId='', taskId='') {
  editCtx = {type, projId, phaseId, taskId};
  document.getElementById('type-chooser').classList.add('hidden');
  document.getElementById('modal-title').textContent = 'แก้ไข ' + (type==='project'?'Project':type==='phase'?'Phase':'Task');

  const proj  = data.projects.find(p=>p.id===projId);
  let target;
  if (type==='project') target=proj;
  else if (type==='phase') target=proj.phases.find(ph=>ph.id===phaseId);
  else target=proj.phases.find(ph=>ph.id===phaseId).tasks.find(t=>t.id===taskId);

  document.getElementById('f-name').value   = target.name||'';
  document.getElementById('f-sub').value    = target.sub||'';
  document.getElementById('f-status').value = target.status||'pending';
  document.getElementById('f-owner').value  = target.owner||'';
  document.getElementById('f-next').value   = target.next||'';
  document.getElementById('f-note').value   = target.note||'';
  document.getElementById('f-start').value  = target.start||1;
  document.getElementById('f-dur').value    = target.dur||1;
  document.getElementById('f-mile').value   = target.mile||0;

  // show/hide sections
  setTypeUI(type);
  document.getElementById('f-proj-wrap').classList.add('hidden');
  document.getElementById('f-phase-wrap').classList.add('hidden');
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function setType(t) {
  addType = t;
  document.querySelectorAll('.type-tab').forEach(el=>{
    el.classList.toggle('active', el.textContent.toLowerCase().includes(t));
  });
  setTypeUI(t);
}

function setTypeUI(t) {
  document.getElementById('task-fields').classList.toggle('hidden', t!=='task');
  document.getElementById('f-sub-wrap').classList.toggle('hidden', t==='phase');
  // parent selects for add-new
  if (!editCtx) {
    document.getElementById('f-proj-wrap').classList.toggle('hidden', t!=='phase');
    document.getElementById('f-phase-wrap').classList.toggle('hidden', t!=='task');
  }
  document.getElementById('f-type').value = t;
}

function populateParentSelects(projId, phaseId) {
  const projSel  = document.getElementById('f-proj-sel');
  const phaseSel = document.getElementById('f-phase-sel');
  projSel.innerHTML  = data.projects.map(p=>`<option value="${p.id}" ${p.id===projId?'selected':''}>${p.name}</option>`).join('');
  // populate phases based on selected project
  function refreshPhases() {
    const pid = projSel.value;
    const proj = data.projects.find(p=>p.id===pid);
    phaseSel.innerHTML = (proj?.phases||[]).map(ph=>`<option value="${ph.id}" ${ph.id===phaseId?'selected':''}>${ph.name}</option>`).join('');
  }
  projSel.onchange = refreshPhases;
  refreshPhases();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editCtx = null;
}

function saveItem() {
  const type   = document.getElementById('f-type').value;
  const name   = document.getElementById('f-name').value.trim();
  if (!name) { alert('กรุณากรอกชื่อ'); return; }

  if (editCtx) {
    // EDIT existing
    const proj = data.projects.find(p=>p.id===editCtx.projId);
    if (type==='project') {
      proj.name = name;
      proj.sub  = document.getElementById('f-sub').value.trim();
    } else if (type==='phase') {
      const phase = proj.phases.find(ph=>ph.id===editCtx.phaseId);
      phase.name = name;
    } else {
      const task = proj.phases.find(ph=>ph.id===editCtx.phaseId).tasks.find(t=>t.id===editCtx.taskId);
      Object.assign(task, taskFormData(name));
    }
  } else {
    // ADD new
    if (type==='project') {
      data.projects.push({id:'p'+Date.now(), name, sub:document.getElementById('f-sub').value.trim(), collapsed:false, phases:[]});
    } else if (type==='phase') {
      const projId = document.getElementById('f-proj-sel').value;
      const proj   = data.projects.find(p=>p.id===projId);
      proj.phases.push({id:'ph'+Date.now(), name, collapsed:false, tasks:[]});
    } else {
      const projId  = document.getElementById('f-proj-sel').value;
      const phaseId = document.getElementById('f-phase-sel').value;
      const phase   = data.projects.find(p=>p.id===projId)?.phases.find(ph=>ph.id===phaseId);
      if (!phase) { alert('เลือก Phase ก่อน'); return; }
      phase.tasks.push({id:'t'+Date.now(), ...taskFormData(name)});
    }
  }

  saveLocal(); render(); closeModal();
  toast('💾 บันทึกแล้ว');
}

function taskFormData(name) {
  return {
    name,
    status: document.getElementById('f-status').value,
    owner:  document.getElementById('f-owner').value.trim(),
    next:   document.getElementById('f-next').value.trim(),
    note:   document.getElementById('f-note').value.trim(),
    start: +document.getElementById('f-start').value,
    dur:   +document.getElementById('f-dur').value,
    mile:  +document.getElementById('f-mile').value,
  };
}

function deleteItem(type, projId, phaseId='', taskId='') {
  if (!confirm('ยืนยันการลบ?')) return;
  if (type==='project') {
    data.projects = data.projects.filter(p=>p.id!==projId);
  } else if (type==='phase') {
    const proj = data.projects.find(p=>p.id===projId);
    proj.phases = proj.phases.filter(ph=>ph.id!==phaseId);
  } else {
    const phase = data.projects.find(p=>p.id===projId).phases.find(ph=>ph.id===phaseId);
    phase.tasks = phase.tasks.filter(t=>t.id!==taskId);
  }
  saveLocal(); render();
  toast('🗑 ลบแล้ว');
}

// ══════════════════════════════════════════════════════
// GOOGLE SHEETS SYNC — JSONP (แก้ CORS)
// ══════════════════════════════════════════════════════
function setSyncStatus(state, msg) {
  const pill = document.getElementById('sync-pill');
  const txt  = document.getElementById('sync-txt');
  pill.className = 'sync-pill ' + state;
  txt.textContent = msg;
}
function showSyncBtns(v) {
  document.getElementById('btn-pull').style.display = v?'':'none';
  document.getElementById('btn-push').style.display = v?'':'none';
}
function toggleApiBar() {
  document.getElementById('api-bar').classList.toggle('hidden');
}
function saveApiUrl() {
  const url = document.getElementById('api-url-inp').value.trim();
  if (!url) { alert('กรุณากรอก URL'); return; }
  apiUrl = url;
  localStorage.setItem('mp_api_url', apiUrl);
  showSyncBtns(true);
  toggleApiBar();
  pullSheets();
}

// JSONP helper — ใช้แทน fetch เพื่อหลีกเลี่ยง CORS
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_mp_cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout — ตรวจสอบ Apps Script URL'));
    }, 15000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Network error')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.head.appendChild(script);
  });
}

function pullSheets(silent=false) {
  if (!apiUrl) return;
  setSyncStatus('loading','กำลังดึง…');
  jsonp(apiUrl + '?action=get')
    .then(json => {
      if (json.error) throw new Error(json.error);
      if (json.data) {
        data = json.data;
        saveLocal(); render();
        setSyncStatus('ok','Synced');
        document.getElementById('updated-at').textContent = json.updated ? '· '+json.updated : '';
        if (!silent) toast('✅ ดึงข้อมูลจาก Sheets แล้ว');
      } else {
        setSyncStatus('ok','Sheets ว่าง — ใช้ข้อมูล local');
        if (!silent) toast('⚠ Sheets ว่างอยู่');
      }
    })
    .catch(e => {
      setSyncStatus('err','Error: '+e.message);
      if (!silent) toast('❌ Pull ไม่สำเร็จ: '+e.message);
    });
}

function pushSheets() {
  if (!apiUrl) { alert('ตั้ง API URL ก่อน'); return; }
  setSyncStatus('loading','กำลัง push…');
  // เข้ารหัส data เป็น payload ใน URL (JSONP ส่งได้แค่ GET)
  const payload = encodeURIComponent(JSON.stringify({data, updatedBy:'app'}));
  jsonp(apiUrl + '?action=save&payload=' + payload)
    .then(json => {
      if (json.error) throw new Error(json.error);
      setSyncStatus('ok','Synced');
      document.getElementById('updated-at').textContent = '· '+json.updated;
      toast('✅ Push สำเร็จ — ' + json.projCount + ' projects, ' + json.taskCount + ' tasks');
    })
    .catch(e => {
      setSyncStatus('err','Error');
      toast('❌ Push ไม่สำเร็จ: '+e.message);
    });
}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.classList.remove('show'), 2800);
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target===this) closeModal();
});

init();
</script>
</div><!-- /main-wrap -->
</div><!-- /app -->
<script>
(function(){
  var closeTimer=null;var pinned=localStorage.getItem('sidebarPinned')==='1';
  var sb=document.getElementById('sidebar');var toggle=document.getElementById('sidebar-toggle');
  var edge=document.getElementById('sidebar-edge');var overlay=document.getElementById('sidebar-overlay');
  function openSB(){clearTimeout(closeTimer);if(window.innerWidth>768){document.body.classList.remove('sidebar-collapsed');}else{document.body.classList.add('sidebar-open');}}
  function closeSB(now){if(pinned&&window.innerWidth>768)return;if(window.innerWidth<=768){document.body.classList.remove('sidebar-open');return;}if(now){document.body.classList.add('sidebar-collapsed');}else{closeTimer=setTimeout(()=>document.body.classList.add('sidebar-collapsed'),380);}}
  if(edge)edge.addEventListener('mouseenter',openSB);
  if(sb){sb.addEventListener('mouseenter',()=>clearTimeout(closeTimer));sb.addEventListener('mouseleave',()=>closeSB(false));}
  if(overlay)overlay.addEventListener('click',()=>closeSB(true));
  window.toggleSidebar=function(){if(window.innerWidth<=768){document.body.classList.toggle('sidebar-open');return;}pinned=!pinned;localStorage.setItem('sidebarPinned',pinned?'1':'0');if(toggle)toggle.title=pinned?'Unpin sidebar':'Pin sidebar';if(pinned)openSB();else closeSB(true);};
  if(window.innerWidth>768){if(pinned){document.body.classList.remove('sidebar-collapsed');}else{document.body.classList.add('sidebar-collapsed');}}
})();
</script>
