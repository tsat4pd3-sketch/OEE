ตกหัก หรือคดงอในบริเวณก้านกระบอก&quot;, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__013&quot;, &quot;label&quot;: &quot;Reed Switch&quot;, &quot;parent&quot;: &quot;Air Clamp&quot;, &quot;standard&quot;: null, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__014&quot;, &quot;label&quot;: &quot;เช็คสถานะการทำงานของ Reed Switch และไม่การชำรุด หรือแตกหัก&quot;, &quot;parent&quot;: &quot;Air Clamp&quot;, &quot;standard&quot;: null, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__015&quot;, &quot;label&quot;: &quot;Sensor&quot;, &quot;parent&quot;: null, &quot;standard&quot;: &quot;- ไม่ชำรุด ไม่แตกหัก แสงไฟสถานะติด&quot;, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__016&quot;, &quot;label&quot;: &quot;Proximity Sensor1 (PS1)&quot;, &quot;parent&quot;: &quot;Sensor&quot;, &quot;standard&quot;: null, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__017&quot;, &quot;label&quot;: &quot;Proximity Sensor2 (PS2)&quot;, &quot;parent&quot;: &quot;Sensor&quot;, &quot;standard&quot;: null, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__018&quot;, &quot;label&quot;: &quot;Soleniod Valve&quot;, &quot;parent&quot;: null, &quot;standard&quot;: &quot;- ทำงานปกติ ไม่มีลมรั่วบริเวณจุดเชื่อมระหว่าง Soleniod valve กับ Manifold.&quot;, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__019&quot;, &quot;label&quot;: &quot;ไม่มีลมรั่วบริเวณสายลม และ Fitting&quot;, &quot;parent&quot;: &quot;Soleniod Valve&quot;, &quot;standard&quot;: null, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__020&quot;, &quot;label&quot;: &quot;Reed Switch ,Speed control ,fiting ไม่แตกหัก ชำรุดเสียหาย&quot;, &quot;parent&quot;: &quot;Soleniod Valve&quot;, &quot;standard&quot;: null, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__021&quot;, &quot;label&quot;: &quot;Bolt, Nut&quot;, &quot;parent&quot;: null, &quot;standard&quot;: null, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}, {&quot;id&quot;: &quot;GPHYD04-05__022&quot;, &quot;label&quot;: &quot;เช็คมาร์ค Unipaint&quot;, &quot;parent&quot;: &quot;Bolt, Nut&quot;, &quot;standard&quot;: &quot;มาร์คตรง&quot;, &quot;max&quot;: null, &quot;min&quot;: null, &quot;method&quot;: null}]}]</script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const DATA = JSON.parse(document.getElementById('jig-data').textContent);
const DB_KEY = 'pm_app_history_v2';
const loadHistory = () => { try { return JSON.parse(localStorage.getItem(DB_KEY)||'[]') } catch { return [] } };
const saveHistory = rows => localStorage.setItem(DB_KEY, JSON.stringify(rows));
const fmt = ts => new Date(ts).toLocaleString('th-TH', { dateStyle:'short', timeStyle:'short' });
const cls = (...a) => a.filter(Boolean).join(' ');
function insight(history) {
 const now=new Date(); const ms=new Date(now.getFullYear(), now.getMonth(),1);
 const rows=history.filter(r=>new Date(r.timestamp)>=ms); const ng={}; const cats={};
 const cat=l=>{const s=(l||'').toLowerCase(); if(s.includes('sensor')||s.includes('reed'))return 'Sensor'; if(s.includes('valve')||s.includes('solen'))return 'Valve'; if(s.includes('clamp'))return 'Clamp'; if(s.includes('bolt')||s.includes('nut'))return 'Bolt/Nut'; if(s.includes('pin')||s.includes('locate'))return 'Locate Pin'; return 'Other';};
 rows.forEach(r=>(r.results||[]).forEach(x=>{ if(x.status==='NG') ng[r.jigNo+'||'+x.label]=(ng[r.jigNo+'||'+x.label]||0)+1; const c=cat(x.label); cats[c]=cats[c]||{ng:0,total:0}; cats[c].total++; if(x.status==='NG') cats[c].ng++; }));
 return { anomalies:Object.entries(ng).filter(([,v])=>v>=3).sort((a,b)=>b[1]-a[1]).slice(0,3), trends:Object.entries(cats).map(([k,v])=>({category:k, rate:v.total? v.ng/v.total*100:0, ng:v.ng, total:v.total})).sort((a,b)=>b.rate-a.rate).slice(0,3) };
}
function App() {
 const [tab,setTab]=useState('input'); const [history,setHistory]=useState(loadHistory());
 const [selectedJig,setSelectedJig]=useState(DATA[0]?.jigNo||''); const [inspector,setInspector]=useState(''); const [headerRemark,setHeaderRemark]=useState(''); const [answers,setAnswers]=useState({}); const [search,setSearch]=useState(''); const [statusFilter,setStatusFilter]=useState('ALL');
 const jig=useMemo(()=>DATA.find(j=>j.jigNo===selectedJig)||null,[selectedJig]);
 useEffect(()=>{ setAnswers({}); setHeaderRemark(''); }, [selectedJig]);
 const filteredJigs=useMemo(()=>{ const s=search.trim().toLowerCase(); if(!s) return DATA; return DATA.filter(j=>[j.jigNo,j.jigName,j.partName,j.process,j.model].join(' ').toLowerCase().includes(s)); },[search]);
 const grouped=useMemo(()=>{ if(!jig) return []; const m={}; jig.checkpoints.forEach(cp=>{ const k=cp.parent||'Main'; (m[k]=m[k]||[]).push(cp); }); return Object.entries(m); },[jig]);
 const progress=jig? jig.checkpoints.filter(cp=>answers[cp.id]?.status).length:0; const total=jig? jig.checkpoints.length:0; const ngCount=Object.values(answers).filter(v=>v?.status==='NG').length; const canSave=!!(jig && inspector.trim() && progress===total);
 const dashboardRows=useMemo(()=>statusFilter==='ALL'?history:history.filter(r=>r.overallStatus===statusFilter),[history,statusFilter]);
 const summary=useMemo(()=>{ const pass=dashboardRows.filter(r=>r.overallStatus==='PASS').length; const fail=dashboardRows.filter(r=>r.overallStatus==='FAIL').length; const pmDone=new Set(dashboardRows.map(r=>r.jigNo)).size; const ngMap={}; dashboardRows.forEach(r=>(r.results||[]).forEach(x=>{ if(x.status==='NG') ngMap[x.label]=(ngMap[x.label]||0)+1 })); const topNg=Object.entries(ngMap).map(([label,count])=>({label,count})).sort((a,b)=>b.count-a.count).slice(0,8); return {pass,fail,pmDone,topNg}; },[dashboardRows]);
 const ai=useMemo(()=>insight(history), [history]);
 const saveRecord=()=>{ if(!canSave) return; const rec={ id:(crypto.randomUUID?crypto.randomUUID():String(Date.now())), timestamp:new Date().toISOString(), inspector:inspector.trim(), jigNo:jig.jigNo, jigName:jig.jigName, partName:jig.partName, process:jig.process, model:jig.model, overallStatus:ngCount>0?'FAIL':'PASS', headerRemark:headerRemark.trim(), results:jig.checkpoints.map(cp=>({ checkpointId:cp.id, label:cp.label, parent:cp.parent, standard:cp.standard, status:answers[cp.id]?.status||'', remark:answers[cp.id]?.remark||'' })) }; const next=[rec, ...history]; setHistory(next); saveHistory(next); setInspector(''); setHeaderRemark(''); setAnswers({}); setTab('dashboard'); };
 const clearHistory=()=>{ if(confirm('ล้างประวัติทั้งหมดใน browser นี้ใช่หรือไม่?')){ localStorage.removeItem(DB_KEY); setHistory([]); } };
 const Recharts=window.Recharts||{}; const pieData=[{name:'PASS', value:summary.pass}, {name:'FAIL', value:summary.fail}];
 return <div className="min-h-screen"><div className="sticky top-0 z-20 border-b bg-white"><div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3"><div><div className="text-xl font-bold">PM Web App</div><div className="text-xs text-slate-500">React + Tailwind • ดึงข้อมูลจากไฟล์ PM check sheet</div></div><div className="flex gap-2"><button onClick={()=>setTab('input')} className={cls('px-4 py-2 rounded-xl font-semibold', tab==='input' ? 'bg-sky-600 text-white':'bg-slate-200 text-slate-700')}>Data Input</button><button onClick={()=>setTab('dashboard')} className={cls('px-4 py-2 rounded-xl font-semibold', tab==='dashboard' ? 'bg-sky-600 text-white':'bg-slate-200 text-slate-700')}>Dashboard</button></div></div></div>
  {tab==='input' ? <div className="max-w-7xl mx-auto p-4 grid grid-cols-1 xl:grid-cols-12 gap-4"><div className="xl:col-span-4 bg-white rounded-2xl shadow-sm border p-4"><div className="text-lg font-bold">ส่วนที่ 1: Data Input System</div><div className="mt-3"><label className="text-sm font-medium">ค้นหา Jig</label><input value={search} onChange={e=>setSearch(e.target.value)} className="mt-1 w-full rounded-xl border-slate-300" placeholder="Jig No / Part Name" /></div><div className="mt-3"><label className="text-sm font-medium">Jig Number</label><select value={selectedJig} onChange={e=>setSelectedJig(e.target.value)} className="mt-1 w-full rounded-xl border-slate-300">{filteredJigs.map(j=><option key={j.jigNo} value={j.jigNo}>{j.jigNo} — {j.partName || j.jigName}</option>)}</select></div>{jig && <div className="mt-4 space-y-2 text-sm"><div className="p-3 rounded-xl bg-slate-50"><span className="font-semibold">Jig Name:</span> {jig.jigName||'-'}</div><div className="p-3 rounded-xl bg-slate-50"><span className="font-semibold">Part Name:</span> {jig.partName||'-'}</div><div className="p-3 rounded-xl bg-slate-50"><span className="font-semibold">Process:</span> {jig.process||'-'} • <span className="font-semibold">Model:</span> {jig.model||'-'}</div><div className="p-3 rounded-xl bg-slate-50"><span className="font-semibold">Checkpoints:</span> {total} • <span className="font-semibold text-rose-600">NG:</span> {ngCount}</div></div>}<div className="mt-4"><label className="text-sm font-medium">ชื่อผู้ตรวจ</label><input value={inspector} onChange={e=>setInspector(e.target.value)} className="mt-1 w-full rounded-xl border-slate-300" /></div><div className="mt-3"><label className="text-sm font-medium">หมายเหตุรวม</label><textarea value={headerRemark} onChange={e=>setHeaderRemark(e.target.value)} rows="3" className="mt-1 w-full rounded-xl border-slate-300" /></div><button disabled={!canSave} onClick={saveRecord} className={cls('mt-4 w-full rounded-xl px-4 py-3 font-bold', canSave ? 'bg-sky-600 text-white':'bg-slate-200 text-slate-400')}>Save Inspection</button><div className="mt-2 text-xs text-slate-500">ตอบครบ {progress} / {total} ข้อก่อนบันทึก</div></div><div className="xl:col-span-8 bg-white rounded-2xl shadow-sm border p-4"><div className="flex items-center justify-between"><div className="text-lg font-bold">Checklist</div><div className="text-sm text-slate-500">กด OK / NG ได้ทันที</div></div><div className="mt-4 space-y-4 max-h-[75vh] overflow-auto pr-1">{grouped.map(([groupName, items]) => <div key={groupName} className="border rounded-2xl overflow-hidden"><div className="px-4 py-2 bg-slate-100 font-semibold">{groupName}</div><div className="divide-y">{items.map(cp => { const a=answers[cp.id]||{}; return <div key={cp.id} className="p-4"><div className="flex flex-col lg:flex-row lg:items-start gap-3 justify-between"><div className="flex-1"><div className="font-semibold text-slate-900">{cp.label}</div><div className="text-xs text-slate-500 mt-1">{cp.standard ? `Std: ${cp.standard}` : ''}{cp.max != null ? ` • Max: ${cp.max}` : ''}{cp.min != null ? ` • Min: ${cp.min}` : ''}{cp.method ? ` • Method: ${cp.method}` : ''}</div></div><div className="flex gap-2"><button onClick={()=>setAnswers(prev=>({...prev, [cp.id]:{...prev[cp.id], status:'OK', remark:''}}))} className={cls('px-4 py-2 rounded-xl font-bold', a.status==='OK' ? 'bg-emerald-600 text-white':'bg-emerald-100 text-emerald-700')}>OK</button><button onClick={()=>setAnswers(prev=>({...prev, [cp.id]:{...prev[cp.id], status:'NG'}}))} className={cls('px-4 py-2 rounded-xl font-bold', a.status==='NG' ? 'bg-rose-600 text-white':'bg-rose-100 text-rose-700')}>NG</button></div></div>{a.status==='NG' && <textarea value={a.remark||''} onChange={e=>setAnswers(prev=>({...prev, [cp.id]:{...prev[cp.id], status:'NG', remark:e.target.value}}))} rows="2" placeholder="Remark / แนวทางการแก้ไข" className="mt-3 w-full rounded-xl border-rose-300 bg-rose-50" />}</div> })}</div></div>)}</div></div></div> : <div className="max-w-7xl mx-auto p-4 space-y-4"><div className="grid grid-cols-1 md:grid-cols-4 gap-4"><div className="bg-white rounded-2xl border p-4"><div className="text-sm text-slate-500">Total PM</div><div className="text-3xl font-bold">{history.length}</div></div><div className="bg-white rounded-2xl border p-4"><div className="text-sm text-slate-500">Machines PM แล้ว</div><div className="text-3xl font-bold">{summary.pmDone}</div></div><div className="bg-white rounded-2xl border p-4"><div className="text-sm text-slate-500">PASS</div><div className="text-3xl font-bold text-emerald-600">{summary.pass}</div></div><div className="bg-white rounded-2xl border p-4"><div className="text-sm text-slate-500">FAIL</div><div className="text-3xl font-bold text-rose-600">{summary.fail}</div></div></div><div className="grid grid-cols-1 xl:grid-cols-3 gap-4"><div className="bg-white rounded-2xl border p-4"><div className="font-bold mb-3">Overall Status</div>{Recharts.ResponsiveContainer ? <div style={{width:'100%', height:260}}><Recharts.ResponsiveContainer><Recharts.PieChart><Recharts.Pie data={pieData} dataKey="value" nameKey="name" innerRadius={55} outerRadius={90} /><Recharts.Tooltip /></Recharts.PieChart></Recharts.ResponsiveContainer></div> : <div className="text-slate-500">Chart not available</div>}</div><div className="bg-white rounded-2xl border p-4"><div className="font-bold mb-3">Top NG Items</div>{summary.topNg.length ? <div className="space-y-2">{summary.topNg.map(item => <div key={item.label}><div className="flex justify-between text-sm"><span>{item.label}</span><span className="font-semibold">{item.count}</span></div><div className="h-2 bg-slate-100 rounded-full mt-1"><div className="h-2 bg-rose-500 rounded-full" style={{width:`${Math.max(8, item.count / summary.topNg[0].count * 100)}%`}}></div></div></div>)}</div> : <div className="text-slate-500">ยังไม่มี NG</div>}</div><div className="bg-white rounded-2xl border p-4"><div className="font-bold mb-3">AI Insights</div><div className="space-y-3">{ai.anomalies.length ? ai.anomalies.map(([k,v],i) => { const [jig,label]=k.split('||'); let msg=`Jig ${jig} พบ NG ที่ ${label} เดือนนี้ ${v} ครั้ง`; if(label.toLowerCase().includes('valve')) msg += ' • ควรตรวจสอบระบบลมหลัก'; else if(label.toLowerCase().includes('sensor') || label.toLowerCase().includes('reed')) msg += ' • ควรตรวจสอบ sensor และสายสัญญาณ'; return <div key={i} className="rounded-xl bg-amber-50 border border-amber-200 p-3 text-sm">{msg}</div>; }) : <div className="rounded-xl bg-emerald-50 border border-emerald-200 p-3 text-sm">ยังไม่พบ Anomaly เด่นชัดในเดือนนี้</div>}{ai.trends.map((t,i)=><div key={'t'+i} className="rounded-xl bg-sky-50 border border-sky-200 p-3 text-sm">หมวด <span className="font-semibold">{t.category}</span> มี NG rate {t.rate.toFixed(1)}% ({t.ng} / {t.total})</div>)}</div></div></div><div className="bg-white rounded-2xl border p-4"><div className="flex flex-wrap gap-2 justify-between items-center"><div className="font-bold">History Log</div><div className="flex gap-2"><select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} className="rounded-xl border-slate-300"><option value="ALL">All</option><option value="PASS">PASS</option><option value="FAIL">FAIL</option></select><button onClick={clearHistory} className="px-3 py-2 rounded-xl bg-slate-200 font-medium">Clear History</button></div></div><div className="mt-4 overflow-auto"><table className="min-w-full text-sm"><thead className="bg-slate-100 text-slate-700"><tr><th className="text-left p-2">Timestamp</th><th className="text-left p-2">Inspector</th><th className="text-left p-2">Jig No.</th><th className="text-left p-2">Part Name</th><th className="text-left p-2">Status</th><th className="text-left p-2">NG Count</th></tr></thead><tbody>{dashboardRows.map(row => { const ng=(row.results||[]).filter(r=>r.status==='NG').length; return <tr key={row.id} className="border-t"><td className="p-2">{fmt(row.timestamp)}</td><td className="p-2">{row.inspector}</td><td className="p-2 font-semibold">{row.jigNo}</td><td className="p-2">{row.partName || '-'}</td><td className="p-2"><span className={cls('px-2 py-1 rounded-full text-xs font-semibold', row.overallStatus==='PASS' ? 'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700')}>{row.overallStatus}</span></td><td className="p-2">{ng}</td></tr>; })}</tbody></table></div></div></div>}</div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
